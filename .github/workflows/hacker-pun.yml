name: regenerate hacker pun of the day

on:
  schedule:
    - cron: "5 4 * * *"  # once a day, 04:05 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: generate today's pun banner
        run: python3 scripts/hacker_pun.py

      - name: commit & push if changed
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add assets/hacker-pun.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: rotate hacker pun of the day for $(date -u +%Y-%m-%d)"
            git push
          else
            echo "same pun as yesterday, skipping commit"
          fi
