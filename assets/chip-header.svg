<svg viewBox="0 0 900 280" width="900" height="280" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code','Cascadia Code',monospace">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#30363d" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <marker id="via" markerWidth="6" markerHeight="6" refX="3" refY="3">
      <circle cx="3" cy="3" r="2.2" fill="#58a6ff"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="280" fill="url(#grid)"/>

  <!-- corner registration marks, PCB style -->
  <g stroke="#58a6ff" stroke-width="1.5" opacity="0.6">
    <path d="M10,10 L26,10 M10,10 L10,26"/>
    <path d="M890,10 L874,10 M890,10 L890,26"/>
    <path d="M10,270 L26,270 M10,270 L10,254"/>
    <path d="M890,270 L874,270 M890,270 L890,254"/>
  </g>

  <!-- traces: top-left block -> chip -->
  <polyline points="185,60 185,105 350,105" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#via)"/>
  <!-- top-right block -> chip -->
  <polyline points="715,60 715,105 550,105" fill="none" stroke="#3fb950" stroke-width="2" marker-end="url(#via)"/>
  <!-- bottom-left block -> chip -->
  <polyline points="185,220 185,175 350,175" fill="none" stroke="#d29922" stroke-width="2" marker-end="url(#via)"/>
  <!-- bottom-right block -> chip -->
  <polyline points="715,220 715,175 550,175" fill="none" stroke="#d29922" stroke-width="2" marker-end="url(#via)"/>

  <!-- pulsing signal dots traveling the buses -->
  <circle r="3.2" fill="#7ee787">
    <animateMotion dur="3.4s" repeatCount="indefinite" path="M185,60 L185,105 L350,105"/>
  </circle>
  <circle r="3.2" fill="#7ee787">
    <animateMotion dur="2.8s" repeatCount="indefinite" begin="0.6s" path="M715,60 L715,105 L550,105"/>
  </circle>
  <circle r="3.2" fill="#f2cc60">
    <animateMotion dur="3.1s" repeatCount="indefinite" begin="0.3s" path="M185,220 L185,175 L350,175"/>
  </circle>
  <circle r="3.2" fill="#f2cc60">
    <animateMotion dur="2.6s" repeatCount="indefinite" begin="0.9s" path="M715,220 L715,175 L550,175"/>
  </circle>

  <!-- top-left leaf: EMBEDDED SYSTEMS -->
  <rect x="60" y="20" width="250" height="40" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="185" y="45" text-anchor="middle" font-size="13" fill="#c9d1d9" letter-spacing="1">EMBEDDED SYSTEMS</text>

  <!-- top-right leaf: FPGA / SoC -->
  <rect x="590" y="20" width="250" height="40" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="715" y="45" text-anchor="middle" font-size="13" fill="#c9d1d9" letter-spacing="1">FPGA / SoC DESIGN</text>

  <!-- bottom-left leaf: HARDWARE SECURITY -->
  <rect x="60" y="220" width="250" height="40" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="185" y="245" text-anchor="middle" font-size="13" fill="#c9d1d9" letter-spacing="1">HARDWARE SECURITY</text>

  <!-- bottom-right leaf: APPLIED ML -->
  <rect x="590" y="220" width="250" height="40" rx="4" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="715" y="245" text-anchor="middle" font-size="13" fill="#c9d1d9" letter-spacing="1">APPLIED ML</text>

  <!-- central IC package -->
  <g>
    <!-- pin legs -->
    <g stroke="#8b949e" stroke-width="2">
      <line x1="370" y1="90" x2="370" y2="80"/>
      <line x1="400" y1="90" x2="400" y2="80"/>
      <line x1="430" y1="90" x2="430" y2="80"/>
      <line x1="470" y1="90" x2="470" y2="80"/>
      <line x1="500" y1="90" x2="500" y2="80"/>
      <line x1="530" y1="90" x2="530" y2="80"/>

      <line x1="370" y1="190" x2="370" y2="200"/>
      <line x1="400" y1="190" x2="400" y2="200"/>
      <line x1="430" y1="190" x2="430" y2="200"/>
      <line x1="470" y1="190" x2="470" y2="200"/>
      <line x1="500" y1="190" x2="500" y2="200"/>
      <line x1="530" y1="190" x2="530" y2="200"/>
    </g>

    <rect x="350" y="90" width="200" height="100" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
    <text x="450" y="130" text-anchor="middle" font-size="17" font-weight="bold" fill="#58a6ff" letter-spacing="1">URVISH KOSTA</text>
    <text x="450" y="150" text-anchor="middle" font-size="10.5" fill="#8b949e" letter-spacing="1.5">TOP_MODULE :: SoC_ENGINEER</text>
    <text x="450" y="170" text-anchor="middle" font-size="10" fill="#6e7681" letter-spacing="1">rev. Chemnitz, DE // v4.years_experience</text>
  </g>

  <text x="450" y="18" text-anchor="middle" font-size="9" fill="#484f58" letter-spacing="2">// block_design.bd  —  generated top-level architecture</text>
</svg>
